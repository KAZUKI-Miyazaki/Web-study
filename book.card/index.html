<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>book.card</title>
</head>

<body>
    <header>
        <h1>おすすめの本紹介</h1>
    </header>    

    <section class="section-grid">
        <div class="book-card">
            <h2>コンビニ人間</h2>
            <p>村田沙耶香</p>
            <P>普通とは何か考えずにはいられない</P>
        </div>

        <div class="book-card">
            <h2>ウエハースの椅子</h2>
            <p>江国香織</p>
            <P>ほれぼれする文体</P>
        </div>

        <div class="book-card">
            <h2>正欲</h2>
            <p>朝井リョウ</p>
            <P>普通と違う、それでも僕の普通</P>
        </div>

        <div class="book-card">
            <h2>ある男</h2>
            <p>平野啓一郎</p>
            <P>私を形行くるのは過去か、現在か</P>
        </div>
    </section>

<footer class="footer-card">
    <p class="p-style">books.card</p>
    <p class="p-style">2026/07/19</p> 
</footer>

</body>


</html>
