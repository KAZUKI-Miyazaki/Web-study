<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Coffee ｜ 自家焙煎珈琲と手作りケーキ</title>

  <!-- Google Fonts：見出し用の明朝体と本文用のゴシック体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================
       Hero セクション
       左：メインビジュアル／右：テキストコンテンツ
  ============================================ -->
  <section class="hero">

    <!-- 左カラム：メインビジュアル -->
    <div class="hero__visual">
      <img
        class="hero__image"
        src="images/hero.jpg"
        alt="海外のカフェを思わせる落ち着いた店内で、自家焙煎コーヒーと手作りケーキがテーブルに並んでいる様子"
        width="960"
        height="1200"
        fetchpriority="high"
        loading="eager"
      >
      <!-- 店の雰囲気を伝える小さなサインバッジ -->
      <p class="hero__badge">DAILY ROAST</p>
    </div>

    <!-- 右カラム：テキストコンテンツ -->
    <div class="hero__content">
      <p class="hero__eyebrow">Cafe Coffee</p>

      <h1 class="hero__title">
        自家焙煎珈琲と<br>
        手作りケーキ
      </h1>

      <p class="hero__subtitle">
        日替わりの焙煎珈琲で日々の癒しを提供いたします。
      </p>

      <a href="#" class="hero__cta">
       お問い合わせ
      </a>
    </div>

  </section>

  <!-- ============================================
       About セクション
       左：テキストコンテンツ／右：メインビジュアル
  ============================================ -->
  <section class="about" id="about">

    <!-- 左カラム：テキストコンテンツ -->
    <div class="about__content">
      <p class="about__eyebrow">About</p>

      <h2 class="about__title">
        <p>忙しい毎日に、</p>
        <p>ほっとひと息つける場所を。</p>
      </h2>

      <p class="about__text">
        Cafe Coffeeは、自家焙煎コーヒーと手作りケーキを楽しみながら、心落ち着く時間を過ごせるカフェです。<br>
        海外のカフェを思わせる温かみのある空間で、読書や会話、一人の時間をゆっくりとお楽しみいただけます。<br>
        一杯のコーヒーと心地よい空間が、忙しい毎日に小さな癒しをお届けします。
      </p>
    </div>

    <!-- 右カラム：メインビジュアル -->
    <div class="about__visual">
      <img
        class="about__image"
        src="images/about.jpg"
        alt="本棚とコーヒーが置かれた、海外のカフェのような落ち着いた雰囲気の店内"
        width="960"
        height="1200"
      >
    </div>

  </section>

</body>
</html>
